name: Acceptance

on:
  workflow_dispatch:
    inputs:
      soak_minutes:
        description: "Hosted-runner soak duration in minutes (max 60; 72h must run on real device/self-hosted)"
        required: true
        default: "20"
      soak_interval_seconds:
        description: "Soak probe interval seconds"
        required: true
        default: "15"

jobs:
  matrix-and-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Playback/WebDAV matrix checks
        run: |
          chmod +x tools/playback-webdav-matrix-check.sh
          tools/playback-webdav-matrix-check.sh

      - name: Resolve hosted soak duration
        id: soak
        shell: bash
        run: |
          set -euo pipefail
          soak="${{ github.event.inputs.soak_minutes }}"
          interval="${{ github.event.inputs.soak_interval_seconds }}"
          if [[ ! "$soak" =~ ^[0-9]+$ ]]; then
            echo "invalid soak_minutes: $soak"
            exit 1
          fi
          if [[ ! "$interval" =~ ^[0-9]+$ ]]; then
            echo "invalid soak_interval_seconds: $interval"
            exit 1
          fi
          if (( soak > 60 )); then
            echo "::warning::soak_minutes=$soak exceeds hosted-runner budget; clamped to 60."
            soak=60
          fi
          if (( soak < 1 )); then
            soak=1
          fi
          if (( interval < 5 )); then
            interval=5
          fi
          echo "minutes=$soak" >> "$GITHUB_OUTPUT"
          echo "interval=$interval" >> "$GITHUB_OUTPUT"

      - name: Runtime soak check
        run: |
          chmod +x tools/runtime-soak-check.sh tools/soak-report.sh
          tools/runtime-soak-check.sh "${{ steps.soak.outputs.minutes }}" "${{ steps.soak.outputs.interval }}"

      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-reports-${{ github.run_number }}
          path: .reports/*.md
          include-hidden-files: true
          if-no-files-found: warn
