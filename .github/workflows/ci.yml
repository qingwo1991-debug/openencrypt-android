name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs phases and bootstrap
        run: |
          chmod +x tools/phase-check.sh tools/bootstrap-check.sh
          tools/bootstrap-check.sh
      - name: Validate schema example
        run: |
          python3 tools/schema-check.py

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip when Rust core is absent
        id: rust-check
        run: |
          if [[ -f core-encrypt-rs/Cargo.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Rust
        if: steps.rust-check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt check
        if: steps.rust-check.outputs.exists == 'true'
        run: |
          cd core-encrypt-rs
          cargo fmt --all -- --check
      - name: Rust clippy
        if: steps.rust-check.outputs.exists == 'true'
        run: |
          cd core-encrypt-rs
          cargo clippy -- -D warnings
      - name: Rust test
        if: steps.rust-check.outputs.exists == 'true'
        run: |
          cd core-encrypt-rs
          cargo test

  android-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10.2"
      - name: Android lint + unit test + assembleDebug
        run: |
          if [[ -x ./gradlew ]]; then
            GRADLE_CMD="./gradlew"
          elif command -v gradle >/dev/null 2>&1; then
            GRADLE_CMD="gradle"
          else
            echo "No gradle executable available. Commit Gradle Wrapper or install Gradle in runner."
            exit 1
          fi
          "$GRADLE_CMD" :app-android:lintDebug :app-android:testDebugUnitTest :app-android:assembleDebug

  go-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip when Go core is absent
        id: go-check
        run: |
          if [[ -f core-openlist-go/go.mod ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Go
        if: steps.go-check.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Go vet/test
        if: steps.go-check.outputs.exists == 'true'
        run: |
          cd core-openlist-go
          go vet ./...
          go test ./...
