name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs phases and bootstrap
        run: |
          chmod +x tools/phase-check.sh tools/bootstrap-check.sh
          tools/bootstrap-check.sh
      - name: Validate schema example
        run: |
          python3 tools/schema-check.py

  android-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;27.1.12297006"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10.2"
          cache-disabled: true
      - name: Build Android runtime binaries
        env:
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.1.12297006
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          chmod +x tools/build-android-runtime-bins.sh
          tools/build-android-runtime-bins.sh
      - name: Verify Android runtime binaries
        env:
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          chmod +x tools/check-android-runtime-bins.sh
          tools/check-android-runtime-bins.sh
      - name: Android lint + unit test + assembleDebug
        env:
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          if [[ -x ./gradlew ]]; then
            GRADLE_CMD="./gradlew"
          elif command -v gradle >/dev/null 2>&1; then
            GRADLE_CMD="gradle"
          else
            echo "No gradle executable available. Commit Gradle Wrapper or install Gradle in runner."
            exit 1
          fi
          "$GRADLE_CMD" :app-android:lintDebug :app-android:testDebugUnitTest :app-android:assembleDebug
      - name: Verify debug APK runtime assets
        run: |
          chmod +x tools/check-apk-runtime-assets.sh
          tools/check-apk-runtime-assets.sh app-android/build/outputs/apk/debug/*.apk
      - name: Collect debug APKs
        if: success()
        run: |
          mkdir -p dist
          ls -l app-android/build/outputs/apk/debug
          compgen -G "app-android/build/outputs/apk/debug/*.apk" >/dev/null
          cp app-android/build/outputs/apk/debug/*.apk dist/
      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
      - name: Upload lint report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: |
            app-android/build/reports/lint-results-debug.html
            app-android/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
          if-no-files-found: warn
      - name: CI artifact note
        if: always()
        run: |
          {
            echo "### Android CI Artifact Notes"
            echo "- This workflow validates debug quality gates and uploads debug APKs as workflow artifacts."
            echo "- GitHub workflow artifacts are downloaded as zip containers."
            echo "- Signed stable release APKs are produced only by the \`Release\` workflow on \`v*.*.*\` tags."
          } >> "$GITHUB_STEP_SUMMARY"

  android-preview-release:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;27.1.12297006"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10.2"
          cache-disabled: true
      - name: Build Android runtime binaries
        env:
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.1.12297006
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          chmod +x tools/build-android-runtime-bins.sh
          tools/build-android-runtime-bins.sh
      - name: Verify Android runtime binaries
        env:
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          chmod +x tools/check-android-runtime-bins.sh
          tools/check-android-runtime-bins.sh
      - name: Build preview release APKs (unsigned)
        env:
          BUILD_VERSION_NAME: preview-${{ github.run_number }}
          BUILD_VERSION_CODE: ${{ github.run_number }}
          RUNTIME_BIN_ROOT: ${{ runner.temp }}/android-runtime-bins
        run: |
          if [[ -x ./gradlew ]]; then
            GRADLE_CMD="./gradlew"
          elif command -v gradle >/dev/null 2>&1; then
            GRADLE_CMD="gradle"
          else
            echo "No gradle executable available. Commit Gradle Wrapper or install Gradle in runner."
            exit 1
          fi
          "$GRADLE_CMD" :app-android:assembleRelease
      - name: Verify preview APK runtime assets
        run: |
          chmod +x tools/check-apk-runtime-assets.sh
          tools/check-apk-runtime-assets.sh app-android/build/outputs/apk/release/*.apk
      - name: Collect preview release artifacts
        run: |
          mkdir -p dist
          ls -l app-android/build/outputs/apk/release
          compgen -G "app-android/build/outputs/apk/release/*arm64-v8a*.apk" >/dev/null
          compgen -G "app-android/build/outputs/apk/release/*armeabi-v7a*.apk" >/dev/null
          cp app-android/build/outputs/apk/release/*arm64-v8a*.apk dist/openencrypt-android-preview-arm64-v8a.apk
          cp app-android/build/outputs/apk/release/*armeabi-v7a*.apk dist/openencrypt-android-preview-armeabi-v7a.apk
          sha256sum dist/*.apk > dist/checksums.txt
      - name: Upload preview release artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-release-apk-${{ github.run_number }}
          path: |
            dist/openencrypt-android-preview-arm64-v8a.apk
            dist/openencrypt-android-preview-armeabi-v7a.apk
            dist/checksums.txt
          if-no-files-found: error

  go-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip when Go core is absent
        id: go-check
        run: |
          if [[ -f core-openlist-go/go.mod ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Go
        if: steps.go-check.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false
      - name: Go vet/test
        if: steps.go-check.outputs.exists == 'true'
        run: |
          cd core-openlist-go
          go vet ./...
          go test ./...
